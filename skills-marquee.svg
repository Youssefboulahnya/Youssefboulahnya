<svg width="700" height="70" viewBox="0 0 700 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <rect x="0" y="0" width="700" height="70" />
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <g>
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="translate"
        from="0 0"
        to="-1120 0"
        dur="18s"
        repeatCount="indefinite" />

      <!-- Sequence 1 -->
      <image href="https://skillicons.dev/icons?i=java" x="0"    y="5" width="60" height="60" />
      <image href="https://skillicons.dev/icons?i=c"    x="70"   y="5" width="60" height="60" />
